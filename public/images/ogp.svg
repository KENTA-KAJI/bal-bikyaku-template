<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- Gold decorative lines -->
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#B5973A" stroke-width="1"/>
  <line x1="60" y1="570" x2="1140" y2="570" stroke="#B5973A" stroke-width="1"/>
  <!-- Side lines -->
  <line x1="60" y1="60" x2="60" y2="570" stroke="#B5973A" stroke-width="1"/>
  <line x1="1140" y1="60" x2="1140" y2="570" stroke="#B5973A" stroke-width="1"/>
  <!-- Label -->
  <text x="600" y="200" font-family="serif" font-size="14" fill="#B5973A" text-anchor="middle" letter-spacing="6">BAL SEMINAR</text>
  <!-- Main Title -->
